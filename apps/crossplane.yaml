apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: crossplane
  namespace: argocd

  annotations:
    argocd.argoproj.io/sync-wave: "60"

spec:
  project: platform

  source:
    repoURL: https://github.com/thelazyenginerd/argocd-control-plane.git
    targetRevision: main
    path: infrastructure/crossplane

  destination:
    server: https://kubernetes.default.svc
    namespace: crossplane-system

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
