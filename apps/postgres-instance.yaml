apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: postgres-instance
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "40"
spec:
  project: platform
  source:
    repoURL: https://github.com/thelazyenginerd/argocd-control-plane.git
    targetRevision: dev
    path: infrastructure/postgres
  destination:
    server: https://kubernetes.default.svc
    namespace: databases
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - SkipDryRunOnMissingResource=true
