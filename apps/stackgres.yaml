apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: stackgres-operator
  namespace: argocd

  annotations:
    argocd.argoproj.io/sync-wave: "40"

spec:
  project: platform

  source:
    repoURL: https://stackgres.io/downloads/stackgres-k8s/stackgres/helm/
    chart: stackgres-operator
    targetRevision: 1.18.6

    helm:
      releaseName: stackgres-operator
      values: |
        adminui:
          service:
            type: NodePort

  destination:
    server: https://kubernetes.default.svc
    namespace: stackgres

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - SkipDryRunOnMissingResource=true
      - ServerSideApply=true

  ignoreDifferences:
    # 1. Keep the webhook handler just in case
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      jsonPointers:
        - /spec/conversion/webhook/clientConfig/caBundle

    # 2. Automatically ignore EVERY empty required array in the CRD schemas
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      jqPathExpressions:
        - .spec.versions[].schema.openAPIV3Schema | .. | .required? | select(. == [])
