apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-app
  namespace: argocd

  annotations:
    argocd.argoproj.io/sync-wave: "00"

spec:
  project: default

  source:
    repoURL: git@github.com:thelazyenginerd/argocd-control-plane.git
    targetRevision: HEAD
    path: apps

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd-platform

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
